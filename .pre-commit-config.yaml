default_install_hook_types:
  - pre-commit
  - commit-msg
exclude: ^docs/snippets/|vendor/|node_modules/|target/|dist/|artifacts/|scripts/ci/

repos:
  # Commit message linting
  - repo: https://github.com/Goldziher/gitfluff
    rev: v0.8.0
    hooks:
      - id: gitfluff-lint
        args: ["--write"]
        stages: [commit-msg]

  # AI-Rulez: auto-generate AI assistant configuration files
  - repo: https://github.com/Goldziher/ai-rulez
    rev: v3.10.0
    hooks:
      - id: ai-rulez-generate

  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-added-large-files
        exclude: uv.lock
      - id: detect-private-key
      - id: check-json
      - id: check-yaml
        args: ["--allow-multiple-documents", "--unsafe"]
      - id: check-toml
      - id: check-case-conflict

  # TOML formatting
  - repo: https://github.com/tox-dev/pyproject-fmt
    rev: "v2.20.0"
    hooks:
      - id: pyproject-fmt

  - repo: https://github.com/ComPWA/taplo-pre-commit
    rev: v0.9.3
    hooks:
      - id: taplo-format
        exclude: "pyproject.toml"

  # Python: ruff (linting + formatting) + mypy (type checking)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.6
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.19.1
    hooks:
      - id: mypy
        exclude: "e2e/|scripts/|examples/"

  # Rust: formatting, linting, and license checking
  - repo: https://github.com/AndrejOrsula/pre-commit-cargo
    rev: 0.5.0
    hooks:
      - id: cargo-fmt
        args: ["--all"]
      - id: cargo-clippy
        args: [
          "--fix",
          "--allow-dirty",
          "--allow-staged",
          "--workspace",
          "--exclude=html-to-markdown-php",
          "--exclude=html-to-markdown-py",
          "--exclude=html-to-markdown-node",
          "--exclude=html-to-markdown-wasm",
          "--exclude=benchmark-harness",
          "--all-features",
          "--all-targets",
          "--",
          "-D",
          "warnings",
        ]

  - repo: https://github.com/bnjbvr/cargo-machete
    rev: v0.9.1
    hooks:
      - id: cargo-machete

  - repo: https://github.com/EmbarkStudios/cargo-deny
    rev: 0.19.0
    hooks:
      - id: cargo-deny
        args: ["check"]

  # JavaScript/TypeScript/JSON: biome (formatting + linting)
  - repo: https://github.com/biomejs/pre-commit
    rev: v2.4.8
    hooks:
      - id: biome-format
      - id: biome-lint

  - repo: https://github.com/oxc-project/mirrors-oxlint
    rev: v1.56.0
    hooks:
      - id: oxlint
        args: ["--fix"]
        exclude: ^docs/html_to_markdown_wasm\.js$

  # C/C++: formatting and linting
  - repo: https://github.com/pocc/pre-commit-hooks
    rev: v1.3.5
    hooks:
      - id: clang-format
        args: [--style=file]
        files: ^crates/html-to-markdown-ffi/tests/c/
      - id: cppcheck
        args: ["--std=c11", "--enable=warning,style,performance", "--suppress=missingIncludeSystem", "--suppress=unusedStructMember"]
        files: ^crates/html-to-markdown-ffi/tests/c/

  # Shell scripts: formatting and linting
  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.12.0-2
    hooks:
      - id: shfmt
        args: ["-w", "-i", "2"]
        exclude: '(\.cache/|node_modules/|rust-vendor/|vendor/|\.venv/)'

  - repo: https://github.com/koalaman/shellcheck-precommit
    rev: v0.11.0
    hooks:
      - id: shellcheck

  # GitHub Actions: linting
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.11
    hooks:
      - id: actionlint

  # Java: copy-paste detection and style checking
  - repo: https://github.com/gherynos/pre-commit-java
    rev: v0.6.36
    hooks:
      - id: cpd
        exclude: ^\.mvn/wrapper/
      - id: checkstyle
        args: ["-c", "packages/java/checkstyle.xml", "-p", "packages/java/checkstyle.properties"]
        exclude: ^\.mvn/wrapper/

  # Local hooks for language toolchains
  - repo: local
    hooks:
      - id: golangci-lint-packages
        name: golangci-lint (packages/go/v2)
        entry: bash -c 'cd packages/go/v2 && golangci-lint run --config ../../../.golangci.yml ./...'
        language: system
        files: ^packages/go/
        pass_filenames: false
      - id: rubocop
        name: rubocop
        entry: bash -c 'set -euo pipefail; cd packages/ruby; export BUNDLE_PATH=vendor/bundle; ../../scripts/preferred-ruby.sh -S gem list -i bundler -v 4.0.0 || ../../scripts/preferred-ruby.sh -S gem install bundler -v 4.0.0 --no-document; ../../scripts/preferred-ruby.sh -S bundle install; ../../scripts/preferred-ruby.sh -S bundle exec rubocop --config ./.rubocop.yml --autocorrect-all'
        language: system
        files: ^packages/ruby/
        pass_filenames: false
      - id: rbs-validate
        name: rbs validate
        entry: bash -c 'set -euo pipefail; cd packages/ruby; export BUNDLE_PATH=vendor/bundle; ../../scripts/preferred-ruby.sh -S gem list -i bundler -v 4.0.0 || ../../scripts/preferred-ruby.sh -S gem install bundler -v 4.0.0 --no-document; ../../scripts/preferred-ruby.sh -S bundle install; ../../scripts/preferred-ruby.sh -S bundle exec rbs validate'
        language: system
        files: ^packages/ruby/
        pass_filenames: false
      - id: steep-check
        name: steep check
        entry: bash -c 'set -euo pipefail; cd packages/ruby; export BUNDLE_PATH=vendor/bundle; ../../scripts/preferred-ruby.sh -S gem list -i bundler -v 4.0.0 || ../../scripts/preferred-ruby.sh -S gem install bundler -v 4.0.0 --no-document; ../../scripts/preferred-ruby.sh -S bundle install; ../../scripts/preferred-ruby.sh -S bundle exec steep check'
        language: system
        files: ^packages/ruby/
        pass_filenames: false
      - id: php-lint
        name: php lint (cs-fixer + phpstan)
        entry: bash -c 'cd packages/php && composer install --no-interaction --no-progress && composer run lint:fix'
        language: system
        files: ^packages/php/
        pass_filenames: false
      - id: dotnet-format
        name: dotnet format
        entry: bash -c 'dotnet format packages/csharp/HtmlToMarkdown/HtmlToMarkdown.csproj && dotnet format packages/csharp/HtmlToMarkdown.Tests/HtmlToMarkdown.Tests.csproj'
        language: system
        files: ^packages/csharp/
        pass_filenames: false
      - id: mix-credo
        name: mix credo
        entry: bash -c 'cd packages/elixir && MIX_ENV=dev mix credo --strict'
        language: system
        files: ^packages/elixir/
        pass_filenames: false
      - id: mix-format
        name: mix format
        entry: bash -c 'cd packages/elixir && MIX_ENV=dev mix format --check-formatted'
        language: system
        files: ^packages/elixir/
        pass_filenames: false
      - id: java-verify
        name: maven verify (java)
        entry: bash -lc 'if [ -f "$HOME/.sdkman/bin/sdkman-init.sh" ]; then source "$HOME/.sdkman/bin/sdkman-init.sh" && sdk env; fi; MAVEN_OPTS="${MAVEN_OPTS:-} --enable-native-access=ALL-UNNAMED -Dsun.misc.unsafe.memory.access=allow" mvn -f packages/java/pom.xml -B -DskipTests -Dgpg.skip=true -Dskip.rust.ffi=true verify'
        language: system
        files: ^packages/java/
        pass_filenames: false
      - id: r-lintr
        name: lintr (R)
        entry: bash -c 'cd packages/r && Rscript -e "lints <- lintr::lint_package(); if (length(lints) > 0) { print(lints); quit(status=1) }"'
        language: system
        files: ^packages/r/
        pass_filenames: false
      - id: r-styler
        name: styler format check (R)
        entry: bash -c 'cd packages/r && Rscript -e "out <- styler::style_pkg(dry=\"on\"); if (!all(out\$changed == FALSE)) quit(status=1)"'
        language: system
        files: ^packages/r/
        pass_filenames: false
