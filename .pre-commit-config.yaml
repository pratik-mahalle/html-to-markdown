default_install_hook_types:
  - pre-commit
  - commit-msg
exclude: ^docs/snippets/|vendor/|node_modules/|target/|dist/|artifacts/|scripts/ci/|\.cache/|rust-vendor/|\.venv/

repos:
  # AI-Rulez: auto-generate AI assistant configuration files
  - repo: https://github.com/Goldziher/ai-rulez
    rev: v4.0.3
    hooks:
      - id: ai-rulez-generate

  # Commit message linting
  - repo: https://github.com/Goldziher/gitfluff
    rev: v0.8.0
    hooks:
      - id: gitfluff-lint
        args: ["--write"]
        stages: [commit-msg]

  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-added-large-files
        exclude: uv.lock
      - id: detect-private-key
      - id: check-json
        exclude: tsconfig\.base\.json
      - id: check-yaml
        args: ["--allow-multiple-documents", "--unsafe"]
      - id: check-toml
      - id: check-case-conflict

  # TOML formatting
  - repo: https://github.com/tox-dev/pyproject-fmt
    rev: "v2.21.1"
    hooks:
      - id: pyproject-fmt

  - repo: https://github.com/DevinR528/cargo-sort
    rev: "v2.1.3"
    hooks:
      - id: cargo-sort
        args: [-w]

  # Rust: formatting and linting (core workspace only — bindings handled by alef)
  - repo: https://github.com/AndrejOrsula/pre-commit-cargo
    rev: 0.5.0
    hooks:
      - id: cargo-fmt
        args: ["--all"]
      - id: cargo-clippy
        args:
          [
            "--fix",
            "--allow-dirty",
            "--allow-staged",
            "--workspace",
            "--exclude=html-to-markdown-php",
            "--exclude=html-to-markdown-py",
            "--exclude=html-to-markdown-node",
            "--exclude=html-to-markdown-e2e-rust",
            "--all-features",
            "--all-targets",
            "--",
            "-D",
            "warnings",
          ]

  - repo: https://github.com/bnjbvr/cargo-machete
    rev: v0.9.2
    hooks:
      - id: cargo-machete
        exclude: ^e2e/

  - repo: https://github.com/EmbarkStudios/cargo-deny
    rev: 0.19.4
    hooks:
      - id: cargo-deny
        args: ["check"]

  # Markdown linting
  - repo: https://github.com/rvben/rumdl-pre-commit
    rev: "v0.1.81"
    hooks:
      - id: rumdl-fmt
        exclude: 'test_documents/|\.ai-rulez/|\.remote-cache/|e2e/|fixtures/'

  # Shell scripts: formatting and linting
  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.13.1-1
    hooks:
      - id: shfmt
        args: ["-w", "-i", "2"]

  - repo: https://github.com/koalaman/shellcheck-precommit
    rev: v0.11.0
    hooks:
      - id: shellcheck

  # Alef: format and lint all binding languages, verify bindings, sync versions
  - repo: https://github.com/kreuzberg-dev/alef
    rev: v0.7.3
    hooks:
      - id: alef-fmt
      - id: alef-lint
      - id: alef-verify
      - id: alef-sync-versions

  # GitHub Actions: linting
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint

  # Spelling (last — runs after all formatters and generators)
  - repo: https://github.com/crate-ci/typos
    rev: v1.45.1
    hooks:
      - id: typos
        args: [--force-exclude]
