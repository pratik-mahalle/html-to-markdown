version: "3"

vars:
  RUNNER_PATH: "./target/release/snippet-runner"
  SNIPPETS_DIR: "docs/snippets"

tasks:
  build:
    desc: Build snippet-runner
    cmds:
      - cargo build --release -p snippet-runner

  list:
    desc: List all documentation snippets
    deps: [build]
    cmds:
      - "{{.RUNNER_PATH}} list --snippets {{.SNIPPETS_DIR}}"

  validate:syntax:
    desc: Syntax-check all documentation snippets
    deps: [build]
    cmds:
      - "{{.RUNNER_PATH}} validate --snippets {{.SNIPPETS_DIR}} --level syntax"

  validate:
    desc: Validate all documentation snippets (syntax level)
    deps: [validate:syntax]
