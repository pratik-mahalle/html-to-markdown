language = "C"
include_guard = "HTML_TO_MARKDOWN_H"
pragma_once = true
header = "/* Auto-generated C bindings for html-to-markdown */"
autogen_warning = "/* Warning, this file is autogenerated by cbindgen. Don't modify this manually. */"
documentation = true
line_length = 100

after_includes = """
/* Symbol visibility */
#ifndef HTM_EXPORT
  #if defined(HTM_STATIC)
    #define HTM_EXPORT
  #elif defined(_WIN32) || defined(__CYGWIN__)
    #ifdef HTML_TO_MARKDOWN_BUILDING
      #define HTM_EXPORT __declspec(dllexport)
    #else
      #define HTM_EXPORT __declspec(dllimport)
    #endif
  #elif defined(__GNUC__) || defined(__clang__)
    #define HTM_EXPORT __attribute__((visibility("default")))
  #else
    #define HTM_EXPORT
  #endif
#endif
"""

[fn]
prefix = "HTM_EXPORT"

[export]
include = ["html_to_markdown_convert", "html_to_markdown_free_string", "html_to_markdown_version", "html_to_markdown_last_error", "html_to_markdown_last_error_code", "html_to_markdown_error_code_name", "HtmlToMarkdownErrorCode"]

[parse]
parse_deps = false
include = []
