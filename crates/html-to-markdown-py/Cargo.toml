[package]
name = "html-to-markdown-py"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
readme.workspace = true
rust-version.workspace = true
description = "Python bindings (PyO3) for html-to-markdown - high-performance HTML to Markdown converter"
keywords = ["html", "markdown", "python", "pyo3", "bindings"]
categories = ["api-bindings"]

[package.metadata.cargo-machete]
ignored = ["async-trait", "tokio"]

[lib]
name = "_html_to_markdown"
crate-type = ["cdylib", "rlib"]
doctest = false

[features]
default = ["full"]
full = ["metadata", "visitor", "async-visitor", "inline-images"]
extension-module = ["pyo3/extension-module"]
profiling = ["dep:pprof"]
inline-images = ["html-to-markdown-rs/inline-images"]
metadata = ["html-to-markdown-rs/metadata"]
visitor = ["html-to-markdown-rs/visitor"]
async-visitor = ["html-to-markdown-rs/async-visitor", "visitor"]

[dependencies]
async-trait.workspace = true
html-to-markdown-bindings-common = { path = "../html-to-markdown-bindings-common", version = "3.0.0-rc.1", features = [
    "metadata",
    "inline-images",
] }
html-to-markdown-rs = { workspace = true, features = [
    "inline-images",
    "metadata",
    "visitor",
    "async-visitor",
] }
once_cell.workspace = true
pprof = { version = "0.15", features = ["flamegraph"], optional = true }
pyo3.workspace = true
pyo3-async-runtimes = { version = "0.28", features = ["tokio-runtime"] }
tokio = { version = "1", features = ["rt", "rt-multi-thread"] }

[dev-dependencies]
base64 = "0.22"
image = { version = "0.25", default-features = false, features = ["png"] }

[lints]
workspace = true
