[build-system]
requires = ["maturin>=1.0,<2.0"]
build-backend = "maturin"

[project]
name = "html-to-markdown"
version = "3.2.0"
description = "High-performance HTML to Markdown converter"
license = "MIT"
requires-python = ">=3.10"
classifiers = [
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Programming Language :: Python :: 3.14",
]
authors = [
    { name = "Kreuzberg Team" }
]
keywords = ["html", "markdown", "converter"]
[project.urls]
repository = "https://github.com/kreuzberg-dev/html-to-markdown"

[tool.maturin]
module-name = "html_to_markdown_rs._html_to_markdown"
manifest-path = "../../crates/html-to-markdown-py/Cargo.toml"
features = ["pyo3/extension-module"]
python-packages = ["html_to_markdown_rs"]
