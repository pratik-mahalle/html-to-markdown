$schema: https://raw.githubusercontent.com/Goldziher/ai-rulez/main/schema/ai-rules-v3.schema.json
name: html-to-markdown
description: >-
  High-performance HTML to Markdown converter with Rust core and polyglot bindings
  (Python, TypeScript, Ruby, PHP, Go, Java, C#, Elixir, R, WebAssembly, C FFI).
gitignore: true

header:
  style: minimal

includes:
  - name: kreuzberg-core
    source: https://github.com/kreuzberg-dev/ai-rulez.git
    path: modules/core
    merge_strategy: local-override
    local_override: ../ai-rulez
  - name: kreuzberg-cicd
    source: https://github.com/kreuzberg-dev/ai-rulez.git
    path: modules/cicd
    merge_strategy: local-override
    local_override: ../ai-rulez
  - name: kreuzberg-infrastructure
    source: https://github.com/kreuzberg-dev/ai-rulez.git
    path: modules/infrastructure
    merge_strategy: local-override
    local_override: ../ai-rulez
  - name: kreuzberg-e2e-generator
    source: https://github.com/kreuzberg-dev/ai-rulez.git
    path: modules/e2e-generator
    merge_strategy: local-override
    local_override: ../ai-rulez

builtins:
  - rust
  - python
  - pyo3
  - typescript
  - napi-rs
  - go
  - java
  - ruby
  - magnus
  - php
  - ext-php-rs
  - csharp
  - elixir
  - rustler
  - r
  - wasm
  - security
  - git-workflow
  - code-quality
  - testing
  - token-efficiency
  - default-commands

presets:
  - claude
  - gemini
  - codex
compression:
  level: moderate
version: "3.0"
