version: "2"

run:
  timeout: 5m
  concurrency: 4

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - revive
    - gocyclo
    - goconst
    - gocritic
    - gosec
    - misspell
    - nakedret

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: true
  goconst:
    min-len: 3
    min-occurrences: 3
  gocyclo:
    min-complexity: 25
  revive:
    confidence: 0.8
    severity: warning

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - goconst
        - gocyclo
        - gosec
