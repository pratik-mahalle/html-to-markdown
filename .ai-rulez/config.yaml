$schema: https://raw.githubusercontent.com/Goldziher/ai-rulez/main/schema/ai-rules-v3.schema.json
description: High-performance HTML→Markdown converter with Rust core and polyglot bindings (Python, TypeScript, Ruby, PHP). Focus on performance, accuracy, and language parity.
gitignore: true
name: html-to-markdown

# Include shared ai-rulez configuration from git repository
includes:
  - name: kreuzberg-core
    source: https://github.com/kreuzberg-dev/ai-rulez.git
    path: modules/core
    merge_strategy: local-override
  - name: kreuzberg-cicd
    source: https://github.com/kreuzberg-dev/ai-rulez.git
    path: modules/cicd
    merge_strategy: local-override

builtins:
  - rust
  - python
  - pyo3
  - typescript
  - napi-rs
  - go
  - java
  - ruby
  - magnus
  - php
  - ext-php-rs
  - csharp
  - elixir
  - rustler
  - r
  - wasm
  - security
  - git-workflow
  - code-quality
  - testing
  - token-efficiency
  - default-commands

presets:
  - claude
  - gemini
  - codex
compression:
  level: moderate
version: "3.0"
